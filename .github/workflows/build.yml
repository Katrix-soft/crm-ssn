name: Build Windows
on:
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt Pillow pyinstaller
      - name: Build
        run: flet pack main.py --icon LogoJCOrg.ico --name KatrixBroker --add-data "data;data" --add-data "assets;assets" --hidden-import cryptography --hidden-import passlib --hidden-import jose --hidden-import bcrypt --hidden-import slowapi --hidden-import fastapi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KatrixBroker-windows
          path: dist/KatrixBroker.exe
