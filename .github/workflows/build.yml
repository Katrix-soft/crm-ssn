name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install flet pyinstaller requests beautifulsoup4 lxml soupsieve Pillow

      - name: Convert icon to ICO
        run: |
          python -c "from PIL import Image; img = Image.open('LogoJCOrg.png'); img.save('LogoJCOrg.ico', format='ICO')"

      - name: Build
        run: flet pack main.py -i LogoJCOrg.ico --name "KatrixBroker" --add-data "data;data" --add-data "assets;assets" --add-data "LogoJCOrg.png;."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KatrixBroker-windows
          path: dist/KatrixBroker.exe