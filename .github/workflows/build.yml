name: Build Windows
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install deps
        run: |
          pip install -r requirements.txt Pillow pyinstaller
          
      - name: Build
        run: flet pack main.py --icon LogoJCOrg.ico --name KatrixBroker --add-data "data;data" --add-data "assets;assets" --hidden-import cryptography --hidden-import passlib --hidden-import jose --hidden-import bcrypt --hidden-import slowapi --hidden-import fastapi
        
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/KatrixBroker.exe
          name: Release ${{ github.ref_name }}
          body: |
            Actualización automática de Katrix Broker.
            Versión: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
